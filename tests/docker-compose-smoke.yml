services:
  web:
    image: ${IMAGE:?IMAGE is required, e.g. IMAGE=indrahulu/laravel-base:php8.3}
    ports:
      - "${WEB_HTTP_PORT:-18080}:8080"
      - "${WEB_HTTPS_PORT:-18443}:8443"
    environment:
      APP_ROLE: web
      APP_HEALTHCHECK_PATH: /up
      RUN_OPTIMIZE_CLEAR_ON_BOOT: ${RUN_OPTIMIZE_CLEAR_ON_BOOT:-false}
      RUN_STORAGE_LINK_ON_BOOT: ${RUN_STORAGE_LINK_ON_BOOT:-false}
      RUN_MIGRATIONS_ON_BOOT: ${RUN_MIGRATIONS_ON_BOOT:-false}
      RUN_SEEDERS_ON_BOOT: ${RUN_SEEDERS_ON_BOOT:-false}
      RUN_QUEUE_RESTART_ON_BOOT: ${RUN_QUEUE_RESTART_ON_BOOT:-false}
    volumes:
      - ./fixture-app:/var/www/html
    restart: "no"

  worker:
    image: ${IMAGE:?IMAGE is required, e.g. IMAGE=indrahulu/laravel-base:php8.3}
    environment:
      APP_ROLE: worker
      APP_HEALTHCHECK_PATH: /up
      RUN_OPTIMIZE_CLEAR_ON_BOOT: ${RUN_OPTIMIZE_CLEAR_ON_BOOT:-false}
      RUN_STORAGE_LINK_ON_BOOT: ${RUN_STORAGE_LINK_ON_BOOT:-false}
      RUN_MIGRATIONS_ON_BOOT: ${RUN_MIGRATIONS_ON_BOOT:-false}
      RUN_SEEDERS_ON_BOOT: ${RUN_SEEDERS_ON_BOOT:-false}
      RUN_QUEUE_RESTART_ON_BOOT: ${RUN_QUEUE_RESTART_ON_BOOT:-false}
      QUEUE_CONNECTION: redis
      QUEUE_NAMES: default
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./fixture-app:/var/www/html
    restart: "no"

  scheduler:
    image: ${IMAGE:?IMAGE is required, e.g. IMAGE=indrahulu/laravel-base:php8.3}
    environment:
      APP_ROLE: scheduler
      APP_HEALTHCHECK_PATH: /up
      RUN_OPTIMIZE_CLEAR_ON_BOOT: ${RUN_OPTIMIZE_CLEAR_ON_BOOT:-false}
      RUN_STORAGE_LINK_ON_BOOT: ${RUN_STORAGE_LINK_ON_BOOT:-false}
      RUN_MIGRATIONS_ON_BOOT: ${RUN_MIGRATIONS_ON_BOOT:-false}
      RUN_SEEDERS_ON_BOOT: ${RUN_SEEDERS_ON_BOOT:-false}
      RUN_QUEUE_RESTART_ON_BOOT: ${RUN_QUEUE_RESTART_ON_BOOT:-false}
    volumes:
      - ./fixture-app:/var/www/html
    restart: "no"

  all:
    image: ${IMAGE:?IMAGE is required, e.g. IMAGE=indrahulu/laravel-base:php8.3}
    ports:
      - "${ALL_HTTP_PORT:-28080}:8080"
      - "${ALL_HTTPS_PORT:-28443}:8443"
    environment:
      APP_ROLE: all
      APP_HEALTHCHECK_PATH: /up
      RUN_OPTIMIZE_CLEAR_ON_BOOT: ${RUN_OPTIMIZE_CLEAR_ON_BOOT:-false}
      RUN_STORAGE_LINK_ON_BOOT: ${RUN_STORAGE_LINK_ON_BOOT:-false}
      RUN_MIGRATIONS_ON_BOOT: ${RUN_MIGRATIONS_ON_BOOT:-false}
      RUN_SEEDERS_ON_BOOT: ${RUN_SEEDERS_ON_BOOT:-false}
      RUN_QUEUE_RESTART_ON_BOOT: ${RUN_QUEUE_RESTART_ON_BOOT:-false}
      QUEUE_CONNECTION: redis
      QUEUE_NAMES: default
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./fixture-app:/var/www/html
    restart: "no"

  redis:
    image: redis:7-alpine
    restart: "no"
