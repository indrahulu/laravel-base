services:
  web:
    image: indrahulu/laravel-base:php8.3
    ports:
      - "18080:8080"
      - "18443:8443"
    environment:
      APP_ROLE: web
      APP_HEALTHCHECK_PATH: /up
      RUN_OPTIMIZE_CLEAR_ON_BOOT: ${RUN_OPTIMIZE_CLEAR_ON_BOOT:-false}
      RUN_STORAGE_LINK_ON_BOOT: ${RUN_STORAGE_LINK_ON_BOOT:-false}
      RUN_MIGRATIONS_ON_BOOT: ${RUN_MIGRATIONS_ON_BOOT:-false}
      RUN_SEEDERS_ON_BOOT: ${RUN_SEEDERS_ON_BOOT:-false}
      RUN_QUEUE_RESTART_ON_BOOT: ${RUN_QUEUE_RESTART_ON_BOOT:-false}
    volumes:
      - ./fixture-app:/var/www/html
    restart: unless-stopped

  worker:
    image: indrahulu/laravel-base:php8.3
    environment:
      APP_ROLE: worker
      APP_HEALTHCHECK_PATH: /up
      RUN_OPTIMIZE_CLEAR_ON_BOOT: ${RUN_OPTIMIZE_CLEAR_ON_BOOT:-false}
      RUN_STORAGE_LINK_ON_BOOT: ${RUN_STORAGE_LINK_ON_BOOT:-false}
      RUN_MIGRATIONS_ON_BOOT: ${RUN_MIGRATIONS_ON_BOOT:-false}
      RUN_SEEDERS_ON_BOOT: ${RUN_SEEDERS_ON_BOOT:-false}
      RUN_QUEUE_RESTART_ON_BOOT: ${RUN_QUEUE_RESTART_ON_BOOT:-false}
      QUEUE_CONNECTION: redis
      QUEUE_NAMES: default
    volumes:
      - ./fixture-app:/var/www/html
    restart: unless-stopped

  scheduler:
    image: indrahulu/laravel-base:php8.3
    environment:
      APP_ROLE: scheduler
      APP_HEALTHCHECK_PATH: /up
      RUN_OPTIMIZE_CLEAR_ON_BOOT: ${RUN_OPTIMIZE_CLEAR_ON_BOOT:-false}
      RUN_STORAGE_LINK_ON_BOOT: ${RUN_STORAGE_LINK_ON_BOOT:-false}
      RUN_MIGRATIONS_ON_BOOT: ${RUN_MIGRATIONS_ON_BOOT:-false}
      RUN_SEEDERS_ON_BOOT: ${RUN_SEEDERS_ON_BOOT:-false}
      RUN_QUEUE_RESTART_ON_BOOT: ${RUN_QUEUE_RESTART_ON_BOOT:-false}
    volumes:
      - ./fixture-app:/var/www/html
    restart: unless-stopped

  all:
    image: indrahulu/laravel-base:php8.3
    ports:
      - "28080:8080"
      - "28443:8443"
    environment:
      APP_ROLE: all
      APP_HEALTHCHECK_PATH: /up
      RUN_OPTIMIZE_CLEAR_ON_BOOT: ${RUN_OPTIMIZE_CLEAR_ON_BOOT:-false}
      RUN_STORAGE_LINK_ON_BOOT: ${RUN_STORAGE_LINK_ON_BOOT:-false}
      RUN_MIGRATIONS_ON_BOOT: ${RUN_MIGRATIONS_ON_BOOT:-false}
      RUN_SEEDERS_ON_BOOT: ${RUN_SEEDERS_ON_BOOT:-false}
      RUN_QUEUE_RESTART_ON_BOOT: ${RUN_QUEUE_RESTART_ON_BOOT:-false}
      QUEUE_CONNECTION: redis
      QUEUE_NAMES: default
    volumes:
      - ./fixture-app:/var/www/html
    restart: unless-stopped
