services:
  laravel-base:
    image: indrahulu/laravel-base:php8.3
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      APP_ROLE: all
      APP_UID: ${APP_UID:-1000}
      APP_GID: ${APP_GID:-1000}
      APP_ENV: local
      APP_DEBUG: "true"
      SSL_SELF_SIGNED_ENABLE: "true"
      QUEUE_CONNECTION: redis
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./example-app:/var/www/html
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  db-data:
